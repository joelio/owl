<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Ground line -->
  <line x1="20" y1="260" x2="380" y2="260" stroke="#555" stroke-width="2" stroke-dasharray="8,4" />

  <!-- Back wheel -->
  <circle cx="130" cy="235" r="35" fill="none" stroke="#666" stroke-width="3" />
  <circle cx="130" cy="235" r="3" fill="#666" />
  <!-- Spokes -->
  <line x1="130" y1="200" x2="130" y2="270" stroke="#888" stroke-width="1" />
  <line x1="95" y1="235" x2="165" y2="235" stroke="#888" stroke-width="1" />
  <line x1="105" y1="210" x2="155" y2="260" stroke="#888" stroke-width="1" />
  <line x1="155" y1="210" x2="105" y2="260" stroke="#888" stroke-width="1" />

  <!-- Front wheel -->
  <circle cx="280" cy="235" r="35" fill="none" stroke="#666" stroke-width="3" />
  <circle cx="280" cy="235" r="3" fill="#666" />
  <!-- Spokes -->
  <line x1="280" y1="200" x2="280" y2="270" stroke="#888" stroke-width="1" />
  <line x1="245" y1="235" x2="315" y2="235" stroke="#888" stroke-width="1" />
  <line x1="255" y1="210" x2="305" y2="260" stroke="#888" stroke-width="1" />
  <line x1="305" y1="210" x2="255" y2="260" stroke="#888" stroke-width="1" />

  <!-- Frame -->
  <!-- Bottom bracket to seat tube -->
  <line x1="195" y1="220" x2="175" y2="170" stroke="#E8A317" stroke-width="4" stroke-linecap="round" />
  <!-- Bottom bracket to rear axle -->
  <line x1="195" y1="220" x2="130" y2="235" stroke="#E8A317" stroke-width="4" stroke-linecap="round" />
  <!-- Seat tube to rear axle (seat stay) -->
  <line x1="175" y1="170" x2="130" y2="235" stroke="#E8A317" stroke-width="3" stroke-linecap="round" />
  <!-- Top tube -->
  <line x1="175" y1="170" x2="250" y2="165" stroke="#E8A317" stroke-width="4" stroke-linecap="round" />
  <!-- Down tube -->
  <line x1="195" y1="220" x2="250" y2="165" stroke="#E8A317" stroke-width="4" stroke-linecap="round" />
  <!-- Head tube to front axle (fork) -->
  <line x1="250" y1="165" x2="280" y2="235" stroke="#E8A317" stroke-width="3" stroke-linecap="round" />
  <!-- Handlebar post -->
  <line x1="250" y1="165" x2="258" y2="145" stroke="#666" stroke-width="3" stroke-linecap="round" />
  <!-- Handlebars -->
  <path d="M242,142 Q258,135 274,142" stroke="#666" stroke-width="3" fill="none" stroke-linecap="round" />
  <!-- Seat post -->
  <line x1="175" y1="170" x2="172" y2="155" stroke="#666" stroke-width="3" stroke-linecap="round" />
  <!-- Seat -->
  <ellipse cx="172" cy="152" rx="15" ry="5" fill="#4A3728" />
  <!-- Pedals -->
  <line x1="185" y1="225" x2="205" y2="215" stroke="#666" stroke-width="3" stroke-linecap="round" />
  <rect x="181" y="223" width="8" height="4" rx="1" fill="#888" transform="rotate(-15, 185, 225)" />
  <rect x="203" y="211" width="8" height="4" rx="1" fill="#888" transform="rotate(-15, 207, 213)" />

  <!-- OWL on the bicycle -->
  <g transform="translate(135, 50)">
    <!-- Body -->
    <ellipse cx="40" cy="80" rx="30" ry="35" fill="#4A3728" />
    <!-- Belly -->
    <ellipse cx="40" cy="88" rx="20" ry="22" fill="#D4A574" />
    <!-- Belly feathers -->
    <path d="M28,78 Q40,84 52,78" stroke="#C4956A" stroke-width="1" fill="none" />
    <path d="M27,85 Q40,91 53,85" stroke="#C4956A" stroke-width="1" fill="none" />
    <path d="M28,92 Q40,98 52,92" stroke="#C4956A" stroke-width="1" fill="none" />
    <!-- Head -->
    <ellipse cx="50" cy="45" rx="28" ry="24" fill="#5C4033" />
    <!-- Ear tufts -->
    <path d="M30,30 L24,10 L40,28" fill="#5C4033" />
    <path d="M70,30 L76,10 L60,28" fill="#5C4033" />
    <!-- Eye discs -->
    <circle cx="40" cy="43" r="12" fill="#E8D5B7" />
    <circle cx="60" cy="43" r="12" fill="#E8D5B7" />
    <!-- Eyes (looking ahead, determined) -->
    <circle cx="40" cy="43" r="8" fill="#FF8C00" />
    <circle cx="60" cy="43" r="8" fill="#FF8C00" />
    <!-- Pupils (looking forward) -->
    <circle cx="43" cy="42" r="5" fill="#1A1A1A" />
    <circle cx="63" cy="42" r="5" fill="#1A1A1A" />
    <!-- Eye shine -->
    <circle cx="45" cy="40" r="2" fill="white" opacity="0.8" />
    <circle cx="65" cy="40" r="2" fill="white" opacity="0.8" />
    <!-- Beak -->
    <path d="M47,52 L50,60 L53,52" fill="#E8A317" />
    <!-- Wings (swept back, riding pose) -->
    <path d="M12,70 Q0,60 5,85 Q12,78 15,70 Z" fill="#3D2B1F" />
    <!-- Wing gripping handlebar -->
    <path d="M65,75 Q80,65 85,80 Q78,78 68,78 Z" fill="#3D2B1F" />
    <!-- Feet on pedals -->
    <path d="M25,112 L20,118" stroke="#E8A317" stroke-width="2.5" stroke-linecap="round" />
    <path d="M38,115 L42,120" stroke="#E8A317" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Speed lines -->
  <line x1="40" y1="100" x2="80" y2="100" stroke="#888" stroke-width="1.5" opacity="0.4" />
  <line x1="30" y1="120" x2="70" y2="120" stroke="#888" stroke-width="1.5" opacity="0.3" />
  <line x1="50" y1="140" x2="85" y2="140" stroke="#888" stroke-width="1.5" opacity="0.4" />
  <line x1="35" y1="160" x2="65" y2="160" stroke="#888" stroke-width="1" opacity="0.3" />
  <line x1="45" y1="200" x2="75" y2="200" stroke="#888" stroke-width="1" opacity="0.2" />

  <!-- Scarf fluttering behind -->
  <path d="M170,88 Q145,82 120,90 Q100,95 80,88" stroke="#E74C3C" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8" />
  <path d="M170,88 Q150,95 130,100 Q110,104 90,98" stroke="#C0392B" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6" />
</svg>
