<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e" />
      <stop offset="100%" style="stop-color:#16213e" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)" />
  <!-- Owl icon (simplified) -->
  <g transform="translate(40, 20) scale(0.8)">
    <!-- Body -->
    <ellipse cx="100" cy="120" rx="45" ry="50" fill="#4A3728" />
    <!-- Belly -->
    <ellipse cx="100" cy="132" rx="28" ry="32" fill="#D4A574" />
    <!-- Head -->
    <ellipse cx="100" cy="72" rx="38" ry="32" fill="#5C4033" />
    <!-- Ear tufts -->
    <path d="M68,48 L62,26 L80,45" fill="#5C4033" />
    <path d="M132,48 L138,26 L120,45" fill="#5C4033" />
    <!-- Eye discs -->
    <circle cx="84" cy="70" r="16" fill="#E8D5B7" />
    <circle cx="116" cy="70" r="16" fill="#E8D5B7" />
    <!-- Eyes -->
    <circle cx="84" cy="70" r="10" fill="#FF8C00" />
    <circle cx="116" cy="70" r="10" fill="#FF8C00" />
    <!-- Pupils -->
    <circle cx="86" cy="68" r="6" fill="#1A1A1A" />
    <circle cx="118" cy="68" r="6" fill="#1A1A1A" />
    <!-- Eye shine -->
    <circle cx="88" cy="66" r="2.5" fill="white" opacity="0.8" />
    <circle cx="120" cy="66" r="2.5" fill="white" opacity="0.8" />
    <!-- Beak -->
    <path d="M96,82 L100,92 L104,82" fill="#E8A317" />
  </g>
  <!-- Title -->
  <text x="240" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="bold" fill="#E8D5B7">Parliament of Owls</text>
  <!-- Subtitle -->
  <text x="240" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8B9DC3">Query multiple LLMs in parallel</text>
  <!-- Tags -->
  <g transform="translate(240, 140)">
    <rect x="0" y="0" width="100" height="26" rx="13" fill="#FF8C00" opacity="0.2" />
    <text x="50" y="18" font-family="monospace" font-size="12" fill="#FF8C00" text-anchor="middle">deep research</text>
    <rect x="110" y="0" width="90" height="26" rx="13" fill="#4CAF50" opacity="0.2" />
    <text x="155" y="18" font-family="monospace" font-size="12" fill="#4CAF50" text-anchor="middle">github issues</text>
    <rect x="210" y="0" width="50" height="26" rx="13" fill="#2196F3" opacity="0.2" />
    <text x="235" y="18" font-family="monospace" font-size="12" fill="#2196F3" text-anchor="middle">free</text>
    <rect x="270" y="0" width="75" height="26" rx="13" fill="#9C27B0" opacity="0.2" />
    <text x="307" y="18" font-family="monospace" font-size="12" fill="#9C27B0" text-anchor="middle">multi-llm</text>
  </g>
</svg>
